name: Dev Release

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  dev-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Generate dev version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          DEV_TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          DEV_VERSION="${BASE_VERSION}-dev.${DEV_TIMESTAMP}"
          echo "version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Delete previous dev release
        run: gh release delete dev --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "đź§Ş Dev Preview â€” ${{ steps.version.outputs.version }}"
          body: |
            **Preview build** from `develop` branch.

            Commit: ${{ github.sha }}
            Version: `${{ steps.version.outputs.version }}`

            > âš ď¸Ź This is automatically updated on every push to `develop`.
            > Enable "Show beta versions" in HACS to install.
          prerelease: true
          files: dist/bayrol-pool-card.js

      - name: Sync develop â†’ main
        run: |
          # Check if there are differences between develop and main
          if git diff --quiet origin/main...origin/develop; then
            echo "No changes to sync"
            exit 0
          fi

          # Create or update PR from develop â†’ main
          EXISTING_PR=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, skipping"
          else
            gh pr create \
              --base main \
              --head develop \
              --title "chore: sync develop â†’ main" \
              --body "Automated sync from \`develop\` to \`main\` to keep README and docs up to date for HACS." \
              --label "auto-sync"
          fi

          # Auto-merge (requires checks to pass first)
          PR_NUMBER=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --merge --admin --delete-branch=false
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
