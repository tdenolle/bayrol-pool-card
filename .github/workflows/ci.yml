name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

  hacs-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
